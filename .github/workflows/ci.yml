name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e .[dev,redis,tracing]

      - name: Lint
        run: ruff check app tests

      - name: Type-check
        run: mypy app

      - name: Test
        run: pytest tests -v
